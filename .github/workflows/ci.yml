name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run build (if defined)
        run: |
          if node -e "const s=require('./package.json').scripts||{};process.exit(s.build?0:1)"; then
            npm run build
          else
            echo "No build script found; skipping build."
          fi

      - name: Run tests (if defined)
        run: |
          if node -e "const s=require('./package.json').scripts||{};process.exit(s.test?0:1)"; then
            npm test
          else
            echo "No test script found; skipping tests."
          fi

      - name: Run lint (if defined)
        run: |
          if node -e "const s=require('./package.json').scripts||{};process.exit(s.lint?0:1)"; then
            npm run lint
          else
            echo "No lint script found; skipping lint."
          fi
